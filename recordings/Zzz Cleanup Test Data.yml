name: Zzz Cleanup Test Data
description: Deletes test records left behind by other recordings (the Sales Order
  and Firm Planned Prod. Order created by Create New SO and Plan FPPO, the TEST1
  Stockkeeping Unit, and the TEST1 item). Named to sort last alphabetically so it
  runs after every other recording in the suite -- recordings that depend on TEST1
  persisting (e.g. Create New Stockkeeping Unit) still find it during the same run.
  Deletion order matters here -- the Sales Order and its Production Order go first,
  since Item deletion is blocked while outstanding documents reference it; the
  Stockkeeping Unit goes before the Item since it references it too.
telemetryId: be888760-5802-461b-803c-65548da85c26
start:
  profile: BUSINESS MANAGER
